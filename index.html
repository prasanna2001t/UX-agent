<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Technical Writer Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 1. Change Font Globally */
        body { 
            background-color: #f0f2f5; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
        }

        .card { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        
        /* 2. Style the Response Area */
        #output { 
            min-height: 400px; 
            background: #ffffff; 
            border: 1px solid #dee2e6; 
            border-radius: 8px; 
            padding: 20px; 
            white-space: pre-wrap; 
            font-family: 'Inter', sans-serif; /* Clean font for results */
            font-size: 15px;
            line-height: 1.6;
            color: #333;
        }

        .loading-spinner { display: none; margin-left: 10px; }
        
        /* Progress Bar Styling */
        .progress { height: 8px; display: none; border-radius: 10px; }
        #progressText { font-size: 0.85rem; font-weight: 500; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-primary">Hi Jaya</h1>
        <p class="text-muted">Drafting, Reviewing, and Refining in one swift pass.</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card p-4 h-100">
                <h5 class="mb-3">Raw Engineering Notes</h5>
                <textarea id="userInput" class="form-control flex-grow-1 mb-3" style="height: 350px;" 
                    placeholder="Paste your rough notes or command here..."></textarea>
                <button id="genBtn" onclick="runAgent()" class="btn btn-primary btn-lg w-100">
                    Generate & Refine
                    <span id="spinner" class="spinner-border spinner-border-sm loading-spinner"></span>
                </button>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card p-4 h-100">
                <h5 class="mb-3">Refined Documentation</h5>

                <div id="progressText" class="text-muted mb-2"></div>
                <div class="progress mb-3" id="progressContainer">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%"></div>
                </div>

                <div id="output">Your polished content will appear here...</div>
                
                <div class="mt-4">
                    <h6 class="text-secondary border-bottom pb-2">Editor's Critique Applied:</h6>
                    <div id="reviewNotes" class="p-2 text-muted small italic bg-light rounded">
                        The agent's internal review notes will show up here.
                    </div>
                </div>

                <button onclick="copyToClipboard()" class="btn btn-outline-secondary mt-3">Copy Markdown</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function runAgent() {
        const notes = document.getElementById('userInput').value;
        const outputDiv = document.getElementById('output');
        const reviewDiv = document.getElementById('reviewNotes');
        const btn = document.getElementById('genBtn');
        const spinner = document.getElementById('spinner');
        
        // Added: Progress bar elements
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const progressText = document.getElementById('progressText');

        if (!notes.trim()) return alert("Please enter some notes first!");

        // UI Setup
        btn.disabled = true;
        spinner.style.display = "inline-block";
        outputDiv.innerText = "Agent is working...";
        reviewDiv.innerText = "Analyzing notes...";

        // Show loading state
        progressContainer.style.display = 'flex';
        let width = 0;
        
        // "Fake" progress steps
        const progressInterval = setInterval(() => {
            if (width < 90) {
                width += 1;
                progressBar.style.width = width + '%';
                if (width < 30) progressText.innerText = "Drafting initial guide...";
                else if (width < 60) progressText.innerText = "Critiquing for technical accuracy...";
                else progressText.innerText = "Refining final markdown...";
            }
        }, 150); 

        try {
            const LAMBDA_URL = "https://yk2tf47ong3um7xxo2fgzhob7e0qaajx.lambda-url.ap-south-1.on.aws/";

            const response = await fetch(LAMBDA_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ notes: notes })
            });

            // Handle progress completion
            clearInterval(progressInterval);
            progressBar.style.width = '100%';
            progressText.innerText = "Generation Complete!";
            setTimeout(() => { progressContainer.style.display = 'none'; progressText.innerText = ""; }, 2500);

            const contentType = response.headers.get("content-type");
            if (contentType && contentType.includes("application/json")) {
                const data = await response.json();
                outputDiv.innerText = data.text || "No text generated.";
                reviewDiv.innerText = data.reviewNotes || "Refinement complete.";
            } else {
                const errorBody = await response.text();
                throw new Error("Received HTML instead of JSON. Check Lambda logs.");
            }

        } catch (err) {
            clearInterval(progressInterval);
            progressContainer.style.display = 'none';
            console.error("FETCH ERROR:", err);
            outputDiv.innerHTML = `<span class="text-danger"><b>Error:</b> ${err.message}</span>`;
            reviewDiv.innerText = "Error details logged in console.";
        } finally {
            btn.disabled = false;
            spinner.style.display = "none";
        }
    }

    function copyToClipboard() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text);
        alert("Markdown copied to clipboard!");
    }
</script>

</body>
</html>
